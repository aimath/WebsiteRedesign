{% extends "base.html" %}
{% load cms_tags static %}
{% block title %}
    {% page_attribute "page_title" %}
{% endblock title %}
{% block content %}
    <section class="header-banner" tag="banner">
        <div class="container">
            <div class="row align-items-center">
                <div class="col">
                    <h1>{% placeholder "page_title" %}</h1>
                    <span class="fst-italic">The American Institute of Mathematics</span>
                </div>
            </div>
        </div>
    </section>
    <div class="container">
        <div class="row mt-4 mb-5 g-4 align-items-start">
            <div class="col-lg-12">
                <div class="section-content">
                    {% block page_content %}
                    {% endblock page_content %}
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
