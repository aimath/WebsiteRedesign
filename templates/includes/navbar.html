{% load cms_tags sekizai_tags static %}
<style>
nav#main-navbar { background: #1f4467; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
nav#main-navbar .navbar-brand img { filter: brightness(0) invert(1); opacity: 0.9; }
nav#main-navbar .nav-link { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.2px; color: rgba(255,255,255,0.88) !important; padding: 0.65rem 0.85rem; }
nav#main-navbar .nav-link:hover { color: #fff !important; }
nav#main-navbar .navbar-toggler { border: 2px solid rgba(255,255,255,0.75); border-radius: 6px; padding: 0.35rem 0.6rem; }
nav#main-navbar .navbar-toggler-icon { filter: brightness(0) invert(1); opacity: 1; }
nav#main-navbar .dropdown-menu { background: #17324c; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; box-shadow: 0 8px 28px rgba(0,0,0,0.3); padding: 0.5rem 0; min-width: 260px; }
nav#main-navbar .dropdown-item { color: rgba(255,255,255,0.82); font-size: 0.865rem; padding: 0.42rem 1.25rem; }
nav#main-navbar .dropdown-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
nav#main-navbar .dropdown-header { color: rgba(255,255,255,0.4); font-size: 0.68rem; letter-spacing: 1.2px; text-transform: uppercase; padding: 0.5rem 1.25rem 0.2rem; }
nav#main-navbar .dropdown-divider { border-color: rgba(255,255,255,0.1); }
nav#main-navbar .nav-item.dropdown:hover > .dropdown-menu { display: block; }
</style>
<nav id="main-navbar"
     class="navbar navbar-expand-xl navbar-dark"
     aria-label="Main navigation">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center"
       href="{% url 'index' %}">
      <img src="{% static 'images/aimlogotransparentnotext.png' %}"
           alt="American Institute of Mathematics"
           style="max-height:70px">
    </a>
    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#main-navbar-content"
            aria-controls="main-navbar-content"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="main-navbar-content">
      <ul class="navbar-nav mx-auto gap-1">
        {% include "includes/nav_items.html" %}
        {% comment %} Support AIM link is commented out intentionally {% endcomment %}
      </ul>
    </div>
  </div>
</nav>
